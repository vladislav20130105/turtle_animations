<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выставка Turtle Анимаций</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🐢</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-top">
            <h1>🐢 Выставка Turtle Анимаций</h1>
            <div style="display: flex; gap: 15px; align-items: center;">
                <button id="btnAddAnimation" class="btn-add-animation" onclick="openAddForm()" style="display: none; margin: 0;">➕ Добавить</button>
                <button class="btn-theme" onclick="toggleTheme()">🌙 Тёмный режим</button>
                <button class="btn-admin" onclick="openAdminLogin()">🔐 Админ</button>
            </div>
        </div>
        <p class="subtitle">Красивые графические демонстрации с помощью Python Turtle</p>
        <p style="font-size: 0.9em; opacity: 0.8; margin-top: 10px;">
            💡 Совет: Запустите <code style="background:rgba(255,255,255,0.2); padding:2px 6px; border-radius:3px;">python setup.py</code> для создания полноценных изображений
        </p>
    </header>

    <main>
        <div class="gallery">
            <!-- Пользовательские анимации будут добавлены здесь -->
        </div>
    </main>

    <!-- Модальное окно для кода -->
    <div id="codeModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeCode()">&times;</span>
            <h2 id="codeTitle"></h2>
            <pre><code id="codeContent"></code></pre>
            <button class="btn-copy" onclick="copyToClipboard()">📋 Копировать код</button>
        </div>
    </div>

    <!-- Модальное окно для добавления новой анимации -->
    <div id="addAnimationModal" class="modal">
        <div class="modal-content add-form">
            <span class="close" onclick="closeAddForm()">&times;</span>
            <h2>➕ Добавить новую анимацию</h2>
            <form id="animationForm">
                <div class="form-group">
                    <label for="animName">Название анимации:</label>
                    <input type="text" id="animName" placeholder="Например: Спираль V2" required>
                </div>
                <div class="form-group">
                    <label for="animIcon">Иконка/Эмодзи:</label>
                    <input type="text" id="animIcon" placeholder="🌀" maxlength="2" required>
                </div>
                <div class="form-group">
                    <label for="animImage">Или загрузи свою картинку:</label>
                    <input type="file" id="animImage" accept="image/*">
                    <small style="color: var(--text-color); opacity: 0.7;">Если выберешь картинку, иконка не понадобится</small>
                </div>
                <div class="form-group">
                    <label for="animColor">Цвет фона:</label>
                    <input type="color" id="animColor" value="#667eea" required>
                </div>
                <div class="form-group">
                    <label for="animDescription">Описание:</label>
                    <textarea id="animDescription" placeholder="Описание вашей анимации" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label for="animCode">Python код:</label>
                    <textarea id="animCode" placeholder="import turtle\n\n# Ваш код здесь" rows="10" required></textarea>
                </div>
                <button type="submit" class="btn-submit">✅ Добавить анимацию</button>
            </form>
        </div>
    </div>

    <!-- Модальное окно для диалога подтверждения -->
    <div id="confirmModal" class="modal">
        <div class="modal-content confirm-dialog">
            <h2 id="confirmTitle">Подтверждение</h2>
            <p id="confirmMessage"></p>
            <div class="confirm-buttons">
                <button class="btn-confirm-yes" id="confirmYesBtn">✅ Да, удалить</button>
                <button class="btn-confirm-no" id="confirmNoBtn">❌ Отмена</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно для входа в админку -->
    <div id="adminLoginModal" class="modal">
        <div class="modal-content admin-login">
            <span class="close" onclick="closeAdminLogin()">&times;</span>
            <h2>🔐 Вход в админку</h2>
            <form id="adminLoginForm">
                <div class="form-group">
                    <label for="adminCode">Введи код доступа:</label>
                    <input type="password" id="adminCode" placeholder="Сюда вводи код" required>
                </div>
                <button type="submit" class="btn-submit">Войти</button>
            </form>
        </div>
    </div>

    <!-- Модальное окно админки -->
    <div id="adminPanelModal" class="modal">
        <div class="modal-content admin-panel">
            <span class="close" onclick="closeAdminPanel()">&times;</span>
            <h2>👨‍💼 Админ-панель</h2>
            <button class="btn-logout" onclick="logoutAdmin()">🚪 Выйти</button>
            <div id="adminAnimsList" class="admin-animations-list"></div>
        </div>
    </div>

    <!-- Контейнер для уведомлений -->
    <div id="notificationContainer" class="notification-container"></div>

    <script src="script.js"></script>
</body>
</html>
